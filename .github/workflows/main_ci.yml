# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PawnLogic — CI Workflow
# Runs ruff lint, fast PR tests, and release-only full validation.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: CI

# ── Triggers ──────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - "release/**"          # Full release validation
      - "chore/**"            # Allow pre-release cleanup branch self-checks
      - "fix/**"              # Allow fix branch self-checks
      - "i18n/**"             # Allow i18n branch self-checks
      - "test/**"             # Allow temporary test branch manual runs
  pull_request:
    branches: [main]
  workflow_dispatch:          # Allow manual CI runs on any branch

# ── FIX #4: Prevent duplicate concurrent runs on the same branch ─────
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── FIX #7: Least-privilege permissions ──────────────────────────────
permissions:
  contents: read

jobs:
  # ── Static checks: run first and fail fast ─────────────────────────
  lint:
    name: "🔍 Lint (ruff)"
    runs-on: ubuntu-latest
    timeout-minutes: 5             # FIX #2: Prevent hangs

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"             # FIX #3: Enable pip cache

      - name: Install ruff
        run: pip install ruff

      # FIX #5: Add ruff lint; check real errors without forcing style.
      - name: ruff check
        run: ruff check . --output-format=github

  # ── Typed island checks: keep scope narrow and fail fast ─────────────
  typecheck:
    name: "🔎 Type Check (mypy)"
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python --version
          python -m mypy --version

      - name: mypy typed island
        run: |
          python -m mypy \
            core/turn_api.py \
            core/turn_guards.py \
            core/tool_result.py \
            core/tool_executor.py \
            core/runtime_context.py \
            core/provider_runtime.py

  # ── Fast feedback tests for normal development ─────────────────────
  test-fast:
    name: "🧪 Fast Tests (Python 3.11)"
    needs: [lint, typecheck]       # Run tests only after static checks pass
    runs-on: ubuntu-latest
    timeout-minutes: 10            # Prevent pytest from hanging forever
    if: >
      github.event_name != 'workflow_dispatch' &&
      !startsWith(github.ref_name, 'release/') &&
      !startsWith(github.ref_name, 'test/release-') &&
      !startsWith(github.ref_name, 'fix/release-') &&
      !startsWith(github.ref_name, 'chore/release-') &&
      !startsWith(github.head_ref, 'release/') &&
      !startsWith(github.head_ref, 'test/release-') &&
      !startsWith(github.head_ref, 'fix/release-') &&
      !startsWith(github.head_ref, 'chore/release-')

    env:
      PAWNLOGIC_TEST_MODE: "true"
      MCP_ENABLED: "false"
      PAWNLOGIC_HOME: /tmp/pawnlogic-ci-fast

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"             # FIX #3: Enable pip cache

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python --version
          python -m pip --version

      # FIX #1: Scan only source directories, not the whole tree or venv.
      - name: Syntax check (source only)
        run: python -m compileall -q core/ tools/ utils/ tests/

      - name: Run fast tests
        run: |
          set -o pipefail
          pytest tests/ -v --tb=short --timeout=60 --ignore=tests/test_e2e.py -m "not slow and not e2e and not packaging" 2>&1 | tee pytest-fast-3.11.log

      - name: Upload pytest logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-fast-3.11
          path: pytest-fast-3.11.log
          retention-days: 7

  # ── Release validation: full non-E2E matrix across supported Python ──
  test-full-matrix:
    name: "🧪 Full Matrix (Python ${{ matrix.python-version }}, non-E2E)"
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref_name, 'release/') ||
      startsWith(github.ref_name, 'test/release-') ||
      startsWith(github.ref_name, 'fix/release-') ||
      startsWith(github.ref_name, 'chore/release-') ||
      startsWith(github.head_ref, 'release/') ||
      startsWith(github.head_ref, 'test/release-') ||
      startsWith(github.head_ref, 'fix/release-') ||
      startsWith(github.head_ref, 'chore/release-')

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      PAWNLOGIC_TEST_MODE: "true"
      MCP_ENABLED: "false"
      PAWNLOGIC_HOME: /tmp/pawnlogic-ci-${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python --version
          python -m pip --version

      - name: Syntax check (source only)
        run: python -m compileall -q core/ tools/ utils/ tests/

      - name: Run full non-E2E suite
        run: |
          set -o pipefail
          pytest tests/ -v --tb=short --timeout=60 --ignore=tests/test_e2e.py 2>&1 | tee "pytest-full-${{ matrix.python-version }}.log"

      - name: Upload pytest logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-full-${{ matrix.python-version }}
          path: pytest-full-${{ matrix.python-version }}.log
          retention-days: 7

  # ── Dynamic E2E tests: release/manual only, not duplicated in matrix ──
  dynamic-test:
    name: "🤖 Dynamic E2E (Agent→Agent)"
    needs: test-full-matrix
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref_name, 'release/') ||
      startsWith(github.ref_name, 'test/release-') ||
      startsWith(github.ref_name, 'fix/release-') ||
      startsWith(github.ref_name, 'chore/release-') ||
      startsWith(github.head_ref, 'release/') ||
      startsWith(github.head_ref, 'test/release-') ||
      startsWith(github.head_ref, 'fix/release-') ||
      startsWith(github.head_ref, 'chore/release-')

    env:
      PAWNLOGIC_TEST_MODE: "true"
      MCP_ENABLED: "false"
      PAWNLOGIC_HOME: /tmp/pawnlogic-e2e
      DEEPSEEK_API_KEY: "ci-dummy-not-a-real-key"
      PAWN_API_KEY: "ci-placeholder-key"
      ANTHROPIC_API_KEY: "ci-anthropic-placeholder"
      TERM: "dumb"
      NO_COLOR: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run E2E tests
        run: pytest tests/test_e2e.py -v --tb=short --timeout=30

      - name: Upload E2E test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: |
            tests/test_e2e.py
            pytest-*.log
          retention-days: 7
