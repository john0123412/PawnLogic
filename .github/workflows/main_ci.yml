# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PawnLogic — CI Workflow
# Runs ruff lint and pytest matrix (3.10/3.11/3.12) plus dynamic E2E tests
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: CI

# ── Triggers ──────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - "chore/**"            # Allow pre-release cleanup branch self-checks
      - "fix/**"              # Allow fix branch self-checks
      - "i18n/**"             # Allow i18n branch self-checks
      - "test/**"             # Allow temporary test branch manual runs
    paths-ignore:             # Documentation-only changes do not trigger CI
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main]
  workflow_dispatch:          # Allow manual CI runs on any branch

# ── FIX #4: Prevent duplicate concurrent runs on the same branch ─────
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── FIX #7: Least-privilege permissions ──────────────────────────────
permissions:
  contents: read

jobs:
  # ── Static checks: run first and fail fast ─────────────────────────
  lint:
    name: "🔍 Lint (ruff)"
    runs-on: ubuntu-latest
    timeout-minutes: 5             # FIX #2: Prevent hangs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"             # FIX #3: Enable pip cache

      - name: Install ruff
        run: pip install ruff

      # FIX #5: Add ruff lint; check real errors without forcing style.
      - name: ruff check
        run: ruff check . --output-format=github

  # ── Multi-version test matrix ──────────────────────────────────────
  test:
    name: "🧪 Test (Python ${{ matrix.python-version }})"
    needs: lint                    # Run tests only after lint passes
    runs-on: ubuntu-latest
    timeout-minutes: 15            # FIX #2: Prevent pytest from hanging forever

    strategy:
      fail-fast: false             # FIX #6: Do not cancel other versions after one failure
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      PAWNLOGIC_TEST_MODE: "true"
      MCP_ENABLED: "false"
      PAWNLOGIC_HOME: /tmp/pawnlogic-ci-${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"             # FIX #3: Enable pip cache

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python --version
          python -m pip --version

      # FIX #1: Scan only source directories, not the whole tree or venv.
      - name: Syntax check (source only)
        run: python -m compileall -q core/ tools/ utils/ tests/

      - name: Run tests
        run: |
          set -o pipefail
          pytest tests/ -v --tb=short --timeout=60 2>&1 | tee "pytest-main-${{ matrix.python-version }}.log"

      - name: Upload pytest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-main-${{ matrix.python-version }}
          path: pytest-main-${{ matrix.python-version }}.log
          retention-days: 7

  # ── Dynamic E2E tests: agent tests agent ───────────────────────────
  dynamic-test:
    name: "🤖 Dynamic E2E (Agent→Agent)"
    needs: test
    runs-on: ubuntu-22.04
    timeout-minutes: 8

    env:
      PAWNLOGIC_TEST_MODE: "true"
      MCP_ENABLED: "false"
      PAWNLOGIC_HOME: /tmp/pawnlogic-e2e
      DEEPSEEK_API_KEY: "ci-dummy-not-a-real-key"
      PAWN_API_KEY: "ci-placeholder-key"
      ANTHROPIC_API_KEY: "ci-anthropic-placeholder"
      TERM: "dumb"
      NO_COLOR: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run E2E tests
        run: pytest tests/test_e2e.py -v --tb=short --timeout=30

      - name: Upload E2E test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            tests/test_e2e.py
            pytest-*.log
          retention-days: 7
