# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PawnLogic v0.0.5 — Publish to PyPI (优化版)
# 基于原 publish.yml 的 5 处精准修复
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Publish to PyPI

# FIX #1: 收窄 tag 匹配，避免 v-test / vX 误触发
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"   # 只匹配 v0.0.5, v1.2.3 格式

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false        # 发布不能中断

# FIX #5: 最小权限
permissions:
  contents: write   # 创建 GitHub Release
  id-token: write   # 预留 OIDC trusted publishing 升级路径

jobs:
  # ── FIX #2: 发布前先跑测试（原来完全没有）──────────────────
  test-before-publish:
    name: "✅ Test before publish"
    runs-on: ubuntu-latest
    timeout-minutes: 10            # FIX #4

    env:
      PAWNLOGIC_TEST_MODE: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short --timeout=60

  # ── 动态 E2E 测试 ──────────────────────────────────────────
  dynamic-test:
    name: "🤖 Dynamic E2E (Agent→Agent)"
    needs: test-before-publish
    runs-on: ubuntu-22.04
    timeout-minutes: 8

    env:
      PAWNLOGIC_TEST_MODE: "true"
      DEEPSEEK_API_KEY: "sk-test-fake-key-for-ci"
      PAWN_API_KEY: "test-fake-key"
      ANTHROPIC_API_KEY: "sk-ant-test-fake"
      TERM: "dumb"
      NO_COLOR: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pexpect

      - name: Run E2E tests
        run: pytest tests/test_e2e.py -v --tb=short --timeout=30

      - name: Upload E2E test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-publish
          path: |
            tests/test_e2e.py
            pytest-*.log
          retention-days: 7

  # ── 构建并发布 ────────────────────────────────────────────
  publish:
    name: "🚀 Build & Publish"
    needs: [test-before-publish, dynamic-test]  # 两个门禁都要通过
    runs-on: ubuntu-latest
    timeout-minutes: 10            # FIX #4

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      # FIX #3: 发布前验证包完整性（原来完全缺失）
      - name: Validate package (twine check)
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*
