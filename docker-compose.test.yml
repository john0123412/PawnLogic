# Pre-release smoke tests for pawnlogic.
#
# Setup (one-time):
#   ln -s ~/.pawnlogic/.env .env.smoke
#   ln -s ~/.pawnlogic/custom_providers.json custom_providers.smoke.json
#   # or copy/cp instead of symlink; CI writes them directly from secrets.
#
# Usage:
#   docker compose -f docker-compose.test.yml run --rm smoketest
#   docker compose -f docker-compose.test.yml run --rm interactive-smoke
#
# Pre-0.0.6 the first_run gate required ~/.pawnlogic/.env to exist; that's
# now fixed, so env-only injection works. We still mount .env into the
# container for /provider /keys parity with the real user experience.
#
# After verification:
#   docker compose -f docker-compose.test.yml down --volumes --remove-orphans
# leaves the pawnlogic-smoketest image cached for re-runs.

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile.test
  image: pawnlogic-smoketest:latest
  env_file:
    - .env.smoke
  environment:
    PAWNLOGIC_HOME: /data/pawnlogic
    MCP_ENABLED: "false"
    TERM: dumb
    NO_COLOR: "1"
    PAWNLOGIC_DEFAULT_MODEL: mimo-v2.5
  volumes:
    - ./custom_providers.smoke.json:/data/pawnlogic/custom_providers.json:ro
    - ./.env.smoke:/data/pawnlogic/.env:ro

services:
  smoketest:
    <<: *common
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        echo "── pawn --help ──"
        pawn --help
        echo
        echo "── pawn --eval (real MiMo call) ──"
        pawn --model mimo-v2.5 --eval "Reply with exactly the word: pawnlogic-smoke-ok" --json

  interactive-smoke:
    <<: *common
    stdin_open: true
    tty: true
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        echo "── interactive smoke: scripted /help + /keys + one prompt ──"
        # Drive the TUI with a stdin script; --quiet suppresses banner so output is parseable.
        printf '/help\n/keys\nReply with exactly the word: pawnlogic-interactive-ok\n/exit\n' | pawn --quiet --model mimo-v2.5
