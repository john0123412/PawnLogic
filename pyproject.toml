
[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pawnlogic"
dynamic = ["version"]
description = "A fully autonomous terminal AI agent — multi-model routing, persistent memory, real tool execution"
requires-python = ">=3.10"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "john0123412", email = "junjohn05@gmail.com"},
]
keywords = ["ai-agent", "llm", "ctf", "cli", "autonomous", "multi-model", "security", "pwn"]

dependencies = [
    "python-dotenv>=1.0",
    "rich>=13.0",
    "prompt_toolkit>=3.0",
    "loguru>=0.7",
    "anthropic>=0.40",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[project.urls]
Homepage = "https://github.com/john0123412/PawnLogic"
Repository = "https://github.com/john0123412/PawnLogic"
Issues = "https://github.com/john0123412/PawnLogic/issues"
Changelog = "https://github.com/john0123412/PawnLogic/blob/main/CHANGELOG.md"

[project.scripts]
pawn = "main:main"

[tool.setuptools.dynamic]
# 版本号唯一来源：config/paths.py 中的 VERSION 字符串
version = {attr = "config.paths.VERSION"}

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
