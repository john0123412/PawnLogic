[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pawnlogic"
version = "0.1.0"
description = "A modular AI Agent framework designed for complex task orchestration and logic reasoning."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
openai = ["openai>=1.0"]
anthropic = ["anthropic>=0.20"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["pawnlogic*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
